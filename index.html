<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JIT Cylinders - Gun Drill Pricing</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            margin: 20px; 
            background: #f4f4f4; 
        }
        .container { 
            max-width: 900px; 
            margin: 0 auto; 
            background: white; 
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: 0 4px 25px rgba(0,0,0,0.15); 
            position: relative;
        }
        .logo {
            position: absolute;
            top: 20px;
            right: 30px;
            width: 180px;
        }
        h1 { 
            text-align: center; 
            color: #1a3c6e; 
            margin-top: 10px;
        }
        .inputs { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 25px; 
            margin-top: 40px;
        }
        label { 
            display: block; 
            margin: 12px 0 6px; 
            font-weight: bold; 
            color: #333; 
        }
        select, input { 
            width: 100%; 
            padding: 12px; 
            border: 2px solid #0066cc; 
            border-radius: 6px; 
            font-size: 16px; 
        }
        button { 
            background: #0066cc; 
            color: white; 
            padding: 12px 25px; 
            border: none; 
            border-radius: 6px; 
            font-size: 16px; 
            font-weight: bold; 
            cursor: pointer; 
            margin: 10px 5px;
        }
        button:hover { background: #0055aa; }
        .result { 
            margin-top: 30px; 
            padding: 20px; 
            border-radius: 10px; 
            font-size: 1.35em; 
            line-height: 1.6; 
        }
        .error { background: #ffe6e6; border: 3px solid #f44336; color: #c00; }
        .success { background: #e6f7e6; border: 4px solid #4caf50; }
        .part-number {
            font-family: monospace;
            font-size: 1.45em;
            background: #f0f0f0;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            margin: 15px 0;
            font-weight: bold;
        }
        .note { font-size: 0.95em; color: #555; margin-top: 15px; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <!-- JIT Logo -->
        <img src="/home/workdir/attachments/Original Logo.png" alt="JIT Cylinders" class="logo" onerror="this.style.display='none'">

        <h1>Gun Drill Pricing Quote</h1>
        <p class="note">2-3 Day Lead Time • sales@jitindustries.com</p>

        <div class="inputs">
            <div>
                <label>Rod Diameter (inches)</label>
                <select id="diameter">
                    <option value="1.0">1.0"</option>
                    <option value="1.375">1.375"</option>
                    <option value="1.75">1.75"</option>
                    <option value="2.0" selected>2.0"</option>
                    <option value="2.5">2.5"</option>
                    <option value="3.0">3.0"</option>
                    <option value="3.5">3.5"</option>
                    <option value="4.0">4.0"</option>
                    <option value="4.5">4.5"</option>
                </select>

                <label>Rod Length (inches)</label>
                <input type="number" id="rod_length" step="0.1" value="20">
            </div>

            <div>
                <label>Gun Drill Depth (inches)</label>
                <input type="number" id="drill_depth" step="0.1" value="10">

                <label>Quantity</label>
                <input type="number" id="qty" value="1" min="1">
            </div>
        </div>

        <div style="text-align:center; margin-top: 20px;">
            <button onclick="calculatePrice()">Calculate</button>
            <button onclick="generatePDF()" style="background:#28a745;">📄 Download PDF Quote</button>
        </div>

        <div class="result" id="result">Enter details and click Calculate</div>
    </div>

    <script>
        const rodPerInch = {1.0:2,1.375:3,1.75:5,2.0:6,2.5:8,3.0:11,3.5:16,4.0:21,4.5:30};

        function calculatePrice() {
            const dia = parseFloat(document.getElementById('diameter').value);
            const rodLen = parseFloat(document.getElementById('rod_length').value);
            const drillDepth = parseFloat(document.getElementById('drill_depth').value);
            const qty = parseInt(document.getElementById('qty').value) || 1;

            const resultDiv = document.getElementById('result');

            if (!rodLen || !drillDepth) {
                resultDiv.className = "result error";
                resultDiv.innerHTML = "⚠️ Please enter both Rod Length and Gun Drill Depth.";
                return;
            }
            if (drillDepth > rodLen) {
                resultDiv.className = "result error";
                resultDiv.innerHTML = `❌ Gun drill depth (${drillDepth}") cannot exceed rod length (${rodLen}").`;
                return;
            }
            if (drillDepth > 90) {
                resultDiv.className = "result error";
                resultDiv.innerHTML = `❌ Maximum gun drill depth is 90".<br><br>Please call <strong>(256) 751-2548</strong>.`;
                return;
            }

            const partNumber = `GD${dia}x${rodLen}x${drillDepth}`;

            const costPerInch = rodPerInch[dia];
            const rodCost = costPerInch * rodLen;
            const drillingCost = 10 * drillDepth;
            const setup = 150;
            let subtotal = rodCost + drillingCost + setup;

            let discountPercent = 0;
            if (qty >= 3) discountPercent = 5;
            else if (qty === 2) discountPercent = 3;

            const discountAmount = Math.round(subtotal * discountPercent / 100);
            const totalPerPiece = subtotal - discountAmount;
            const grandTotal = Math.round(totalPerPiece * qty);

            resultDiv.className = "result success";
            resultDiv.innerHTML = `
                <div class="part-number">Part #: ${partNumber}</div>
                <div style="text-align:center; font-size:1.1em; margin:10px 0;">2-3 Day Lead Time</div>
                
                <strong>Grand Total for ${qty} pcs: <span style="color:#006600; font-size:1.7em;">$${grandTotal}</span></strong><br><br>
                • Rod (${dia}"): $${rodCost}<br>
                • Drilling: $${drillingCost}<br>
                • Setup: $${setup}<br>
                ${discountPercent ? `• Discount (${discountPercent}%): -$${discountAmount}<br>` : ''}
                <strong>Total per piece: $${Math.round(totalPerPiece)}</strong>
            `;

            window.quoteData = { 
                partNumber, dia, rodLen, drillDepth, qty, 
                rodCost, drillingCost, setup, discountPercent, 
                discountAmount, totalPerPiece, grandTotal 
            };
        }

        function generatePDF() {
            if (!window.quoteData) {
                alert("Please calculate the quote first!");
                return;
            }

            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const d = window.quoteData;
            const today = new Date().toLocaleDateString();

            doc.setFontSize(24);
            doc.text("JIT Cylinders", 105, 20, { align: "center" });
            doc.setFontSize(16);
            doc.text("Gun Drill Pricing Quote", 105, 32, { align: "center" });

            doc.setFontSize(12);
            doc.text(`Date: ${today}   |   Quote #: Q${Math.floor(100000 + Math.random() * 900000)}`, 20, 48);

            doc.setFontSize(14);
            doc.text(`Part Number: ${d.partNumber}`, 20, 65);

            let y = 80;
            doc.text(`Rod Diameter: ${d.dia}"`, 20, y); y += 10;
            doc.text(`Rod Length: ${d.rodLen}"`, 20, y); y += 10;
            doc.text(`Gun Drill Depth: ${d.drillDepth}"`, 20, y); y += 10;
            doc.text(`Quantity: ${d.qty} pcs`, 20, y); y += 15;

            doc.setFontSize(13);
            doc.text("Cost Breakdown (per piece)", 20, y); y += 15;
            doc.setFontSize(12);

            doc.text(`Rod Material:      $${d.rodCost}`, 30, y); y += 10;
            doc.text(`Gun Drilling:      $${d.drillingCost}`, 30, y); y += 10;
            doc.text(`Setup Charge:      $${d.setup}`, 30, y); y += 12;

            if (d.discountPercent > 0) {
                doc.text(`Volume Discount (${d.discountPercent}%):   -$${d.discountAmount}`, 30, y); y += 12;
            }

            doc.setFontSize(14);
            doc.text(`Total per Piece:   $${Math.round(d.totalPerPiece)}`, 20, y + 5);
            doc.setFontSize(18);
            doc.setTextColor(0, 102, 204);
            doc.text(`GRAND TOTAL: $${d.grandTotal}`, 20, y + 28);

            // Footer (without lead time)
            doc.setFontSize(10);
            doc.setTextColor(80);
            const footerY = 275;
            doc.line(20, footerY - 8, 190, footerY - 8);
            doc.text("sales@jitindustries.com • (256) 751-2548 • www.jitindustries.com", 105, footerY + 8, { align: "center" });
            doc.text("2201 Hwy 31 SW • Hartselle, AL 35640", 105, footerY + 16, { align: "center" });
            doc.text("Thank you for your business! All prices valid for 30 days.", 105, footerY + 24, { align: "center" });

            doc.save(`${d.partNumber}_Quote_${today.replace(/\//g, '-')}.pdf`);
        }

        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') calculatePrice();
        });
    </script>
</body>
</html>
